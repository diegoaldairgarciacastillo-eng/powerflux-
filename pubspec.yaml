name: powerflux
description: Reproductor de música estilo Poweramp para Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  audioplayers: ^6.1.0

  # Archivos y permisos
  permission_handler: ^11.3.1
  path_provider: ^2.1.3

  # Estado
  provider: ^6.1.2
  shared_preferences: ^2.2.3

  # UI
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
